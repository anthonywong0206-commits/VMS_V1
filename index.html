<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volunteer Hours Management System</title>
  <style>
    :root{--bg:#f4f7fb;--card:#fff;--text:#172033;--muted:#667085;--line:#d9e2ec;--pri:#2563eb;--soft:#eaf2ff;--ok:#059669;--warn:#d97706;--bad:#dc2626;--shadow:0 12px 32px rgba(15,23,42,.08)}
    .dark{--bg:#0b1220;--card:#111827;--text:#f8fafc;--muted:#94a3b8;--line:#253246;--pri:#60a5fa;--soft:#172554;--shadow:0 12px 32px rgba(0,0,0,.22)}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans HK","Microsoft JhengHei",Arial,sans-serif}button,input,select,textarea{font:inherit}.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}.side{background:linear-gradient(180deg,#0f3d8a,#10233f);color:white;padding:22px;position:sticky;top:0;height:100vh}.brand{font-weight:900;font-size:20px;line-height:1.25;margin-bottom:24px}.brand span{display:block;font-size:12px;opacity:.7;margin-top:6px}.nav{display:grid;gap:8px}.nav button{border:0;background:transparent;color:white;text-align:left;padding:12px 14px;border-radius:14px;cursor:pointer;opacity:.82}.nav button.active,.nav button:hover{background:rgba(255,255,255,.14);opacity:1}.main{padding:24px;max-width:1380px;width:100%;margin:auto}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:22px}.title h1{margin:0;font-size:30px}.title p{margin:6px 0 0;color:var(--muted)}.grid{display:grid;gap:16px}.kpis{grid-template-columns:repeat(5,minmax(0,1fr))}.two{grid-template-columns:1.1fr .9fr}.three{grid-template-columns:repeat(3,minmax(0,1fr))}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:var(--shadow)}.kpi small{color:var(--muted);font-weight:700}.kpi b{display:block;font-size:28px;margin-top:8px}.btn{border:1px solid var(--line);background:var(--card);color:var(--text);padding:10px 14px;border-radius:13px;cursor:pointer;font-weight:700}.btn.primary{background:var(--pri);border-color:var(--pri);color:white}.btn.soft{background:var(--soft);border-color:transparent}.btn.bad{background:#fee2e2;color:#991b1b}.toolbar{display:flex;flex-wrap:wrap;gap:10px}.field{display:grid;gap:6px}.field label{font-size:13px;color:var(--muted);font-weight:700}.input,select,textarea{width:100%;border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:13px;padding:10px 12px}textarea{min-height:74px}.form{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.hidden{display:none!important}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid var(--line);padding:10px;text-align:left;vertical-align:top}th{font-size:13px;color:var(--muted);white-space:nowrap}.table-wrap{overflow:auto}.pill{display:inline-flex;padding:5px 9px;border-radius:999px;background:var(--soft);font-size:12px;font-weight:800}.muted{color:var(--muted)}.canvasChart{width:100%;height:250px;border-radius:18px;background:linear-gradient(180deg,rgba(37,99,235,.08),transparent)}.checks{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;max-height:210px;overflow:auto}.check{border:1px solid var(--line);border-radius:12px;padding:9px}.doc-preview{background:white;color:#111;padding:28px;border:1px solid #ddd;max-width:820px;margin:auto;font-family:"Times New Roman","Microsoft JhengHei",serif}.doc-preview h2{text-align:center;margin:4px 0}.doc-row{display:flex;justify-content:space-between;gap:20px;margin:8px 0}.sign-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:28px}.sign{border-top:1px solid #111;padding-top:8px;text-align:center;min-height:70px}.toast{position:fixed;right:18px;bottom:18px;background:#111827;color:white;padding:12px 16px;border-radius:14px;box-shadow:var(--shadow);z-index:99}.mobilebar{display:none}.progress{height:10px;background:var(--soft);border-radius:99px;overflow:hidden}.progress i{display:block;height:100%;background:var(--pri)}@media(max-width:900px){.app{grid-template-columns:1fr}.side{display:none}.mobilebar{display:flex;position:sticky;top:0;z-index:10;background:var(--card);padding:10px;gap:8px;overflow:auto;border-bottom:1px solid var(--line)}.mobilebar button{white-space:nowrap}.main{padding:14px}.kpis,.two,.three,.form{grid-template-columns:1fr}.checks{grid-template-columns:1fr}.title h1{font-size:24px}.top{align-items:flex-start;flex-direction:column}}@media print{body{background:white}.app,.mobilebar,.top,.no-print{display:none!important}.print-area{display:block!important}.doc-preview{border:0;max-width:none;box-shadow:none}}
  </style>
</head>
<body>
<div class="mobilebar" id="mobilebar"></div>
<div class="app">
  <aside class="side"><div class="brand">Volunteer Hours<br/>Management System<span>長者中心 / NGO 義工時數管理</span></div><div class="nav" id="nav"></div></aside>
  <main class="main">
    <div class="top"><div class="title"><h1 id="pageTitle">Dashboard</h1><p id="pageSub">服務時數、津貼及報表總覽</p></div><div class="toolbar"><button class="btn soft" onclick="toggleDark()">🌙 深色模式</button><button class="btn" onclick="backupData()">備份 JSON</button><label class="btn"><input type="file" accept="application/json" onchange="restoreData(event)" hidden/>還原</label></div></div>
    <section id="view"></section>
  </main>
</div>
<div class="print-area hidden" id="printArea"></div>
<script>
const tabs=[['dashboard','Dashboard','服務時數、津貼及報表總覽'],['activity','活動時數','建立小組、講座、活動及督導服務時數'],['case','個案時數','批量輸入、CSV匯入及交通費紀錄'],['volunteers','義工資料','管理義工名單及狀態'],['reports','報表生成','服務時數紀錄表及津貼簽收表'],['settings','設定','單位、津貼及模板設定']];
const defaultData={settings:{unitName:'聖公會聖匠堂長者地區中心',programmeName:'賽馬會樂齡同行計劃',organisation:'香港聖公會福利協會有限公司',allowancePerHour:75,checker:'袁祉筠',approver:'梁善姚',voucherPrefix:'II-A1-c-HCC-042'},volunteers:[{id:'V001',name:'楊耀榮',en:'Yeung Yiu Wing',phone:'91234567',start:'2026-01-01',status:'啟用',transport:true,remark:''},{id:'V002',name:'李小明',en:'Lee Siu Ming',phone:'92345678',start:'2026-02-01',status:'啟用',transport:true,remark:''},{id:'V003',name:'陳大文',en:'Chan Tai Man',phone:'93456789',start:'2026-03-01',status:'啟用',transport:false,remark:''}],records:[{id:uid(),date:'2026-06-03',type:'小組活動',activityName:'精神健康小組',caseNo:'',serviceTarget:'',form:'陪同及協助參與小組',volunteerName:'楊耀榮',startTime:'09:30',endTime:'11:30',hours:2,supervisionHours:0,from:'',to:'',transport:'',transportFee:0,remark:''},{id:uid(),date:'2026-06-05',type:'個案服務',activityName:'',caseNo:'C2026-001',serviceTarget:'陳婆婆',form:'電話聯絡 / 慰問',volunteerName:'楊耀榮',startTime:'10:00',endTime:'10:30',hours:.5,supervisionHours:0,from:'',to:'',transport:'',transportFee:0,remark:''},{id:uid(),date:'2026-06-10',type:'督導',activityName:'義工督導會議',caseNo:'',serviceTarget:'',form:'督導會議',volunteerName:'李小明',startTime:'15:00',endTime:'16:00',hours:0,supervisionHours:1,from:'',to:'',transport:'',transportFee:0,remark:''}]};
let data=load();let route=location.hash.replace('#','')||'dashboard';
function uid(){return Math.random().toString(36).slice(2,9)}function load(){try{return JSON.parse(localStorage.vmsData)||defaultData}catch(e){return defaultData}}function save(){localStorage.vmsData=JSON.stringify(data)}function toast(t){let x=document.createElement('div');x.className='toast';x.textContent=t;document.body.appendChild(x);setTimeout(()=>x.remove(),2600)}function money(n){return '$'+Number(n||0).toLocaleString()}function monthOf(d){return (d||'').slice(0,7)}function currentMonth(){return new Date().toISOString().slice(0,7)}function activeMonth(){return document.querySelector('#monthPick')?.value||currentMonth()}function recs(month=currentMonth()){return data.records.filter(r=>monthOf(r.date)===month)}function hours(rs){return rs.reduce((s,r)=>s+Number(r.hours||0),0)}function shours(rs){return rs.reduce((s,r)=>s+Number(r.supervisionHours||0),0)}function transport(rs){return rs.reduce((s,r)=>s+Number(r.transportFee||0),0)}function allowance(rs){return hours(rs)*Number(data.settings.allowancePerHour||0)}function total(rs){return allowance(rs)+transport(rs)}function byVolunteer(month=currentMonth(),name){return data.records.filter(r=>monthOf(r.date)===month&&(!name||r.volunteerName===name))}
function nav(){const html=tabs.map(t=>`<button class="${route===t[0]?'active':''}" onclick="go('${t[0]}')">${t[1]}</button>`).join('');document.getElementById('nav').innerHTML=html;document.getElementById('mobilebar').innerHTML=html;const t=tabs.find(x=>x[0]===route);pageTitle.textContent=t[1];pageSub.textContent=t[2]}function go(r){route=r;location.hash=r;render()}window.onhashchange=()=>{route=location.hash.replace('#','')||'dashboard';render()};function toggleDark(){document.documentElement.classList.toggle('dark');localStorage.vmsDark=document.documentElement.classList.contains('dark')?'1':'0'}if(localStorage.vmsDark==='1')document.documentElement.classList.add('dark');
function render(){nav();({dashboard,activity,case:casePage,volunteers,reports,settings}[route]||dashboard)()}function kpi(label,val,sub=''){return `<div class="card kpi"><small>${label}</small><b>${val}</b><p class="muted">${sub}</p></div>`}
function dashboard(){const m=currentMonth(),rs=recs(m),group=rs.filter(r=>['小組活動','講座','活動支援','培訓'].includes(r.type)),caseR=rs.filter(r=>r.type==='個案服務');const rank=data.volunteers.map(v=>{const vr=byVolunteer(m,v.name);return{name:v.name,h:hours(vr),s:shours(vr),t:hours(vr)+shours(vr)}}).sort((a,b)=>b.t-a.t);view.innerHTML=`<div class="grid kpis">${kpi('本月服務時數',hours(rs)+' 小時','全部服務')}${kpi('本月督導時數',shours(rs)+' 小時','督導會議')}${kpi('本月個案服務時數',hours(caseR)+' 小時','個案支援')}${kpi('本月小組服務時數',hours(group)+' 小時','小組/活動')}${kpi('本月交通津貼',money(transport(rs)),'交通費')}</div><div class="grid two" style="margin-top:16px"><div class="card"><h3>每月服務時數趨勢</h3><canvas class="canvasChart" id="lineChart" width="900" height="250"></canvas></div><div class="card"><h3>服務類型分布</h3><canvas class="canvasChart" id="pieChart" width="500" height="250"></canvas></div></div><div class="grid two" style="margin-top:16px"><div class="card"><h3>義工排行榜</h3><div class="table-wrap"><table><thead><tr><th>姓名</th><th>服務時數</th><th>督導時數</th><th>總時數</th></tr></thead><tbody>${rank.map(r=>`<tr><td>${r.name}</td><td>${r.h}</td><td>${r.s}</td><td><b>${r.t}</b></td></tr>`).join('')}</tbody></table></div></div><div class="card"><h3>快速功能</h3><div class="toolbar"><button class="btn primary" onclick="go('activity')">➕ 新增服務紀錄</button><button class="btn" onclick="go('case')">📥 匯入 CSV</button><button class="btn" onclick="go('reports')">📄 生成服務時數紀錄表</button><button class="btn" onclick="go('reports')">💰 生成津貼簽收表</button><button class="btn" onclick="exportMonthlyCSV('${m}')">📊 匯出月度報告</button></div></div></div>`;drawLine();drawPie()}
function drawLine(){const c=document.getElementById('lineChart'),ctx=c.getContext('2d');const months=[...new Set(data.records.map(r=>monthOf(r.date)))].sort();const vals=months.map(m=>hours(recs(m))+shours(recs(m)));ctx.clearRect(0,0,c.width,c.height);ctx.strokeStyle='#2563eb';ctx.lineWidth=4;ctx.beginPath();vals.forEach((v,i)=>{const x=50+i*(800/Math.max(1,vals.length-1)),y=210-(v/Math.max(1,...vals))*160;i?ctx.lineTo(x,y):ctx.moveTo(x,y);ctx.fillText(months[i],x-24,235);ctx.fillText(v+'h',x-10,y-10)});ctx.stroke()}
function drawPie(){const c=document.getElementById('pieChart'),ctx=c.getContext('2d'),rs=recs(currentMonth());const cats=['小組活動','個案服務','督導','活動支援'];const vals=cats.map(cat=>rs.filter(r=>r.type===cat).reduce((s,r)=>s+Number(r.hours||0)+Number(r.supervisionHours||0),0));const sum=vals.reduce((a,b)=>a+b,0)||1;let a=-Math.PI/2;['#2563eb','#059669','#d97706','#7c3aed'].forEach((col,i)=>{const ang=vals[i]/sum*Math.PI*2;ctx.beginPath();ctx.moveTo(160,125);ctx.fillStyle=col;ctx.arc(160,125,90,a,a+ang);ctx.fill();a+=ang;ctx.fillStyle=getComputedStyle(document.body).color;ctx.fillText(`${cats[i]} ${vals[i]}h`,300,70+i*32)})}
function activity(){view.innerHTML=`<div class="card"><h3>建立活動服務紀錄</h3><div class="form"><div class="field"><label>活動名稱</label><input id="aName" class="input" value="精神健康小組"></div><div class="field"><label>活動日期</label><input id="aDate" type="date" class="input" value="2026-06-15"></div><div class="field"><label>開始時間</label><input id="aStart" type="time" class="input" value="09:30"></div><div class="field"><label>結束時間</label><input id="aEnd" type="time" class="input" value="11:30"></div><div class="field"><label>服務類型</label><select id="aType"><option>小組活動</option><option>講座</option><option>探訪</option><option>督導會議</option><option>培訓</option><option>活動支援</option><option>其他</option></select></div><div class="field"><label>重複方式</label><select id="repeat"><option value="1">不重複</option><option value="4">每週重複 4 次</option><option value="8">每週重複 8 次</option><option value="12">每月重複 12 次</option></select></div></div><h3>選擇義工</h3><div class="toolbar"><button class="btn soft" onclick="selectAllVols(true)">全選</button><button class="btn" onclick="selectAllVols(false)">取消</button></div><div class="checks" id="volChecks">${data.volunteers.filter(v=>v.status==='啟用').map(v=>`<label class="check"><input type="checkbox" value="${v.name}" checked> ${v.name}<br><small class="muted">${v.id}</small></label>`).join('')}</div><button class="btn primary" style="margin-top:14px" onclick="createActivity()">自動生成紀錄</button></div>`}
function selectAllVols(v){document.querySelectorAll('#volChecks input').forEach(x=>x.checked=v)}function calcTime(s,e){const [sh,sm]=s.split(':').map(Number),[eh,em]=e.split(':').map(Number);return Math.max(0,((eh*60+em)-(sh*60+sm))/60)}function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x.toISOString().slice(0,10)}function createActivity(){const names=[...document.querySelectorAll('#volChecks input:checked')].map(x=>x.value),count=Number(repeat.value),h=calcTime(aStart.value,aEnd.value),newRecs=[];for(let i=0;i<count;i++){const date=addDays(aDate.value,i*7);names.forEach(name=>newRecs.push({id:uid(),date,type:aType.value,activityName:aName.value,caseNo:'',serviceTarget:'',form:aType.value,volunteerName:name,startTime:aStart.value,endTime:aEnd.value,hours:aType.value==='督導會議'?0:h,supervisionHours:aType.value==='督導會議'?h:0,from:'',to:'',transport:'',transportFee:0,remark:''}))}data.records.push(...newRecs);save();toast(`已新增 ${newRecs.length} 筆紀錄`)}
function casePage(){view.innerHTML=`<div class="grid two"><div class="card"><h3>手動輸入個案服務</h3>${recordForm()}<button class="btn primary" onclick="addCase()">新增一筆</button></div><div class="card"><h3>CSV 匯入</h3><p class="muted">免安裝依賴版本支援 CSV 匯入。Excel 可先另存為 CSV 後匯入。</p><div class="toolbar"><label class="btn primary"><input hidden type="file" accept=".csv" onchange="importCSV(event)">匯入 CSV</label><button class="btn" onclick="downloadImportTemplate()">下載 CSV 範本</button></div><p class="muted">欄位：日期,個案編號,服務對象,服務形式,義工姓名,開始時間,結束時間,服務時數,備註,出發地,目的地,交通工具,交通費</p></div></div><div class="card" style="margin-top:16px"><h3>最近紀錄</h3>${recordsTable(data.records.slice(-12).reverse())}</div>`}
function recordForm(){return `<div class="form"><div class="field"><label>服務日期</label><input id="cDate" type="date" class="input" value="2026-06-20"></div><div class="field"><label>個案編號</label><input id="cNo" class="input" value="C2026-001"></div><div class="field"><label>服務對象</label><input id="cTarget" class="input" value="陳婆婆"></div><div class="field"><label>服務形式</label><select id="cForm"><option>上門 / 外出接觸及探訪</option><option>電話聯絡 / 慰問</option><option>陪同及協助參與小組</option><option>陪同及協助參與其他社區活動</option><option>協助連繫社區資源</option><option>其他</option></select></div><div class="field"><label>義工姓名</label><select id="cVol">${data.volunteers.map(v=>`<option>${v.name}</option>`).join('')}</select></div><div class="field"><label>開始時間</label><input id="cStart" type="time" class="input" value="10:00"></div><div class="field"><label>結束時間</label><input id="cEnd" type="time" class="input" value="10:30"></div><div class="field"><label>交通費</label><input id="cFee" type="number" class="input" value="0"></div><div class="field"><label>出發地</label><input id="cFrom" class="input"></div><div class="field"><label>目的地</label><input id="cTo" class="input"></div><div class="field"><label>交通工具</label><input id="cTransport" class="input"></div><div class="field"><label>備註</label><input id="cRemark" class="input"></div></div>`}
function addCase(){const h=calcTime(cStart.value,cEnd.value);data.records.push({id:uid(),date:cDate.value,type:'個案服務',activityName:'',caseNo:cNo.value,serviceTarget:cTarget.value,form:cForm.value,volunteerName:cVol.value,startTime:cStart.value,endTime:cEnd.value,hours:h,supervisionHours:0,from:cFrom.value,to:cTo.value,transport:cTransport.value,transportFee:Number(cFee.value||0),remark:cRemark.value});save();toast('已新增個案服務紀錄');render()}
function volunteers(){view.innerHTML=`<div class="card"><h3>新增義工</h3><div class="form"><input id="vId" class="input" placeholder="義工編號"><input id="vName" class="input" placeholder="中文姓名"><input id="vEn" class="input" placeholder="英文姓名"><input id="vPhone" class="input" placeholder="電話"><input id="vStart" type="date" class="input"><select id="vStatus"><option>啟用</option><option>暫停</option></select><select id="vTrans"><option value="true">交通津貼：是</option><option value="false">交通津貼：否</option></select><input id="vRemark" class="input" placeholder="備註"></div><button class="btn primary" style="margin-top:12px" onclick="addVolunteer()">新增義工</button></div><div class="card" style="margin-top:16px"><h3>義工名單</h3><div class="table-wrap"><table><thead><tr><th>編號</th><th>姓名</th><th>英文名</th><th>電話</th><th>狀態</th><th>交通津貼</th><th></th></tr></thead><tbody>${data.volunteers.map((v,i)=>`<tr><td>${v.id}</td><td>${v.name}</td><td>${v.en||''}</td><td>${v.phone||''}</td><td><span class="pill">${v.status}</span></td><td>${v.transport?'是':'否'}</td><td><button class="btn bad" onclick="delVolunteer(${i})">刪除</button></td></tr>`).join('')}</tbody></table></div></div>`}
function addVolunteer(){data.volunteers.push({id:vId.value||('V'+String(data.volunteers.length+1).padStart(3,'0')),name:vName.value,en:vEn.value,phone:vPhone.value,start:vStart.value,status:vStatus.value,transport:vTrans.value==='true',remark:vRemark.value});save();toast('已新增義工');render()}function delVolunteer(i){if(confirm('確定刪除？')){data.volunteers.splice(i,1);save();render()}}
function reports(){const m=currentMonth();view.innerHTML=`<div class="card"><h3>報表生成</h3><div class="form"><div class="field"><label>月份</label><input id="monthPick" type="month" class="input" value="${m}"></div><div class="field"><label>義工</label><select id="reportVol"><option value="">全部義工</option>${data.volunteers.map(v=>`<option>${v.name}</option>`).join('')}</select></div></div><div class="toolbar" style="margin-top:14px"><button class="btn primary" onclick="generateServiceDoc()">生成服務時數紀錄表</button><button class="btn primary" onclick="generateReceiptDoc()">生成津貼簽收表</button><button class="btn" onclick="exportMonthlyCSV(monthPick.value)">匯出月度 CSV</button><button class="btn" onclick="window.print()">列印 / 另存 PDF</button></div></div><div id="docBox" style="margin-top:16px"></div>`}
function recordsTable(rs){return `<div class="table-wrap"><table><thead><tr><th>日期</th><th>義工</th><th>類型</th><th>活動/個案</th><th>時間</th><th>時數</th><th>督導</th><th>交通費</th></tr></thead><tbody>${rs.map(r=>`<tr><td>${r.date}</td><td>${r.volunteerName}</td><td>${r.type}</td><td>${r.activityName||r.caseNo||''} ${r.serviceTarget||''}</td><td>${r.startTime||''}-${r.endTime||''}</td><td>${r.hours||0}</td><td>${r.supervisionHours||0}</td><td>${money(r.transportFee)}</td></tr>`).join('')}</tbody></table></div>`}
function generateServiceDoc(){const m=monthPick.value,n=reportVol.value;const names=n?[n]:data.volunteers.map(v=>v.name);docBox.innerHTML=names.map(name=>{const rs=byVolunteer(m,name);return `<div class="doc-preview"><h2>賽馬會樂齡同行計劃</h2><h2>樂齡之友服務時數紀錄表 + 交通費申請表</h2><div class="doc-row"><b>樂齡之友姓名：${name}</b><b>月份：${m}</b></div>${recordsTable(rs)}<p><b>總服務時數：</b>${hours(rs)} 小時　<b>督導時數：</b>${shours(rs)} 小時　<b>交通費：</b>${money(transport(rs))}</p><p><b>津貼 / 薪金計算：</b>${hours(rs)} 小時 × ${money(data.settings.allowancePerHour)} = ${money(allowance(rs))}</p><p><b>總金額：</b>${money(total(rs))}</p><div class="sign-grid"><div class="sign">樂齡之友簽署</div><div class="sign">負責職員簽署</div><div class="sign">日期</div></div></div>`}).join('<br>');printArea.innerHTML=docBox.innerHTML}
function generateReceiptDoc(){const m=monthPick.value,n=reportVol.value;const names=n?[n]:data.volunteers.map(v=>v.name);docBox.innerHTML=names.map(name=>{const rs=byVolunteer(m,name);return `<div class="doc-preview"><div>單據編號</div><p>A) 樂齡之友服務津貼：${data.settings.voucherPrefix}</p><h2>${data.settings.organisation}</h2><h2>${data.settings.programmeName}</h2><h2>「樂齡之友」服務津貼及交通費 簽收表</h2><p><b>單位名稱：</b>${data.settings.unitName}</p><p><b>月 / 年：</b>${m}</p><p><b>樂齡之友姓名：</b>${name}</p><p>茲收到 ${data.settings.organisation} 港幣 <b>${money(total(rs))}</b> 以支付以下津貼：</p><table><thead><tr><th>服務類別</th><th>服務日期</th><th>總服務時數</th><th>每小時津貼</th><th>合計金額</th></tr></thead><tbody><tr><td>詳見附件－服務時數紀錄表+交通費申請表</td><td>${m}</td><td>${hours(rs)}</td><td>${money(data.settings.allowancePerHour)}</td><td>${money(allowance(rs))}</td></tr></tbody></table><p>(A)樂齡之友服務津貼 ${money(allowance(rs))} + (B)樂齡之友交通費 ${money(transport(rs))} = (C)津貼總額 <b>${money(total(rs))}</b></p><div class="sign-grid"><div><p>核對人姓名：${data.settings.checker}</p><div class="sign">核對人簽署<br>(計劃負責職員)</div></div><div><p>批准人姓名：${data.settings.approver}</p><div class="sign">批准人簽署<br>(督導主任)</div></div><div><p>收款人姓名：${name}</p><div class="sign">收款人簽署<br>(樂齡之友)</div></div></div><h3>交通費明細</h3><table><thead><tr><th>日期</th><th>往返地點</th><th>交通工具</th><th>總金額</th></tr></thead><tbody>${rs.filter(r=>Number(r.transportFee)>0).map(r=>`<tr><td>${r.date}</td><td>${r.from||''} - ${r.to||''}</td><td>${r.transport||''}</td><td>${money(r.transportFee)}</td></tr>`).join('')||'<tr><td colspan="4">沒有交通費</td></tr>'}</tbody></table></div>`}).join('<br>');printArea.innerHTML=docBox.innerHTML}
function settings(){const s=data.settings;view.innerHTML=`<div class="card"><h3>模板及系統設定</h3><div class="form">${[['unitName','單位名稱'],['programmeName','計劃名稱'],['organisation','機構名稱'],['allowancePerHour','每小時津貼'],['checker','核對人姓名'],['approver','批准人姓名'],['voucherPrefix','單據編號格式']].map(([k,l])=>`<div class="field"><label>${l}</label><input class="input" id="set_${k}" value="${s[k]||''}"></div>`).join('')}</div><button class="btn primary" style="margin-top:12px" onclick="saveSettings()">儲存設定</button></div><div class="card" style="margin-top:16px"><h3>部署說明</h3><p class="muted">此版本是 Vercel Safe 靜態版本，沒有 npm、pnpm、Supabase 或 Chart.js 依賴，避免安裝 timeout。資料暫存於瀏覽器 LocalStorage，可用 JSON 備份及還原。</p></div>`}
function saveSettings(){Object.keys(data.settings).forEach(k=>{const el=document.getElementById('set_'+k);if(el)data.settings[k]=k==='allowancePerHour'?Number(el.value):el.value});save();toast('已儲存設定')}
function exportMonthlyCSV(m){const rows=[['日期','義工姓名','服務類型','活動名稱','個案編號','服務對象','服務形式','開始時間','結束時間','服務時數','督導時數','出發地','目的地','交通工具','交通費','備註'],...data.records.filter(r=>monthOf(r.date)===m).map(r=>[r.date,r.volunteerName,r.type,r.activityName,r.caseNo,r.serviceTarget,r.form,r.startTime,r.endTime,r.hours,r.supervisionHours,r.from,r.to,r.transport,r.transportFee,r.remark])];downloadCSV(rows,`月度服務紀錄_${m}.csv`)}
function downloadCSV(rows,name){const csv=rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href)}
function downloadImportTemplate(){downloadCSV([['日期','個案編號','服務對象','服務形式','義工姓名','開始時間','結束時間','服務時數','備註','出發地','目的地','交通工具','交通費'],['2026-06-20','C2026-001','陳婆婆','電話聯絡 / 慰問','楊耀榮','10:00','10:30','0.5','','','','','0']], '個案服務匯入範本.csv')}
function parseCSV(text){const rows=[];let row=[],cell='',q=false;for(let i=0;i<text.length;i++){const ch=text[i],nx=text[i+1];if(ch==='"'&&q&&nx==='"'){cell+='"';i++}else if(ch==='"'){q=!q}else if(ch===','&&!q){row.push(cell);cell=''}else if((ch==='\n'||ch==='\r')&&!q){if(cell||row.length){row.push(cell);rows.push(row);row=[];cell=''}if(ch==='\r'&&nx==='\n')i++}else cell+=ch}if(cell||row.length){row.push(cell);rows.push(row)}return rows}
function importCSV(e){const f=e.target.files[0];if(!f)return;const reader=new FileReader();reader.onload=()=>{const rows=parseCSV(reader.result).filter(r=>r.length>1);const head=rows.shift();const map={};head.forEach((h,i)=>map[h.trim()]=i);const errors=[],newRs=[];rows.forEach((r,i)=>{const name=r[map['義工姓名']];if(!data.volunteers.some(v=>v.name===name))errors.push(`第 ${i+2} 行：義工姓名不存在：${name}`);const date=r[map['日期']];if(!/^\d{4}-\d{2}-\d{2}/.test(date))errors.push(`第 ${i+2} 行：日期格式錯誤`);const st=r[map['開始時間']]||'',et=r[map['結束時間']]||'';newRs.push({id:uid(),date,type:'個案服務',activityName:'',caseNo:r[map['個案編號']]||'',serviceTarget:r[map['服務對象']]||'',form:r[map['服務形式']]||'',volunteerName:name,startTime:st,endTime:et,hours:Number(r[map['服務時數']]||calcTime(st,et)||0),supervisionHours:0,remark:r[map['備註']]||'',from:r[map['出發地']]||'',to:r[map['目的地']]||'',transport:r[map['交通工具']]||'',transportFee:Number(r[map['交通費']]||0)})});if(errors.length)return alert(errors.join('\n'));data.records.push(...newRs);save();toast(`已匯入 ${newRs.length} 筆紀錄`);render()};reader.readAsText(f,'utf-8')}
function backupData(){const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='vms-backup.json';a.click()}function restoreData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{data=JSON.parse(r.result);save();toast('已還原資料');render()};r.readAsText(f)}
render();
</script>
</body>
